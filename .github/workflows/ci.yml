name: CI

# Runs on every pull request (and every new commit pushed to that PR's branch),
# plus direct pushes to master. Branch protection makes the `verify` job a
# required check, so a PR cannot be merged while any step below is failing.
on:
  pull_request:
  push:
    branches: [master]

# Cancel superseded runs: pushing a new commit to a PR stops the previous run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
